# CI workflow - unit tests and optional E2E (Phase 113)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install "passlib[bcrypt]>=1.7"
          pip install pytest-cov

      - name: Init test databases
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          ./erp-bin db init -d _test_rpc_read
          ./erp-bin db init -d _test_ci

      - name: Run unit tests
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
        run: python3 run_tests.py

      - name: Run unit tests with coverage
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          python -m pytest tests/ --ignore=tests/e2e -v --cov=core --cov=addons \
            --cov-report=xml --cov-report=term --cov-fail-under=0 || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('coverage.xml') != ''
        with:
          name: coverage-report
          path: coverage.xml

  e2e:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install "passlib[bcrypt]>=1.7"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Init E2E database
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
        run: ./erp-bin db init -d erp

      - name: Run E2E tests
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          E2E_BASE_URL: http://localhost:8069
          E2E_LOGIN: admin
          E2E_PASSWORD: admin
          E2E_DB: erp
        run: |
          python scripts/with_server.py --server "./erp-bin server" --port 8069 -- \
            python -m pytest tests/e2e/ -v --e2e-base-url http://localhost:8069 --e2e-db erp
