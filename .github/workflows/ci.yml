# CI workflow - unit tests and optional E2E (Phase 113)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install "passlib[bcrypt]>=1.7"
          pip install pytest-cov

      # Phase 576 / 586 / 593: ERP_WEBCLIENT_ESBUILD_PRIMARY=1 switches _webclient_html to per-file JS; SW precache follows (CACHE erp-web-shell-v3).
      # Regression: DeploymentChecklist v1.211.0; unittest test_webclient_html_esbuild_primary + test_web_service_worker_precache_*_phase590.
      - name: Web concat guard + bundle (esbuild)
        run: |
          if [ -f package.json ]; then
            npm install
            npm run check:assets-concat
            npm run build:web
          fi

      # Phase 684D: require web, sale, account under addons/ (ODOO path = ERP path → empty comm, guard still runs).
      - name: Core addon folders (ERP_DIFF_REQUIRE_CORE)
        run: ERP_DIFF_REQUIRE_CORE=1 ODOO19_ADDONS="${GITHUB_WORKSPACE}/addons" bash scripts/diff_odoo_erp_addons.sh

      # Postgres image has no pgvector extension: db init must succeed anyway (JSONB embedding fallback).
      # Optional: use a pgvector-enabled image locally for RAG vector distance tests.
      - name: Init test databases
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          ./erp-bin db init -d _test_rpc_read
          ./erp-bin db init -d _test_ci

      - name: Run unit tests
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
        run: python3 run_tests.py

      # Phase 692: explicit dual-path smoke — esbuild-primary HTML + SW precache (also covered inside run_tests.py).
      - name: Webclient esbuild-primary smoke (phase 692)
        run: |
          python3 -m unittest \
            tests.test_http.TestHTTP.test_webclient_html_esbuild_primary_env_lists_per_file_js_phase584 \
            tests.test_http.TestHTTP.test_web_service_worker_precache_per_file_js_when_esbuild_primary_phase590 \
            tests.test_http.TestHTTP.test_web_service_worker_default_precache_includes_concat_js_phase590 \
            -v

      # Phase 727: same HTML contract with ERP_WEBCLIENT_ESBUILD_PRIMARY exported for the whole process (matrix-style smoke).
      - name: Webclient esbuild-primary process env (phase 727)
        env:
          ERP_WEBCLIENT_ESBUILD_PRIMARY: "1"
        run: |
          python3 -m unittest tests.test_esbuild_primary_process_env_phase727 -v

      - name: Run unit tests with coverage
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          python -m pytest tests/ --ignore=tests/e2e -v --cov=core --cov=addons \
            --cov-report=xml --cov-report=term --cov-fail-under=0 || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('coverage.xml') != ''
        with:
          name: coverage-report
          path: coverage.xml

  e2e:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install "passlib[bcrypt]>=1.7"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Init E2E database
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
        run: ./erp-bin db init -d erp

      - name: Run E2E tests
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          E2E_BASE_URL: http://localhost:8069
          E2E_LOGIN: admin
          E2E_PASSWORD: admin
          E2E_DB: erp
        run: |
          python scripts/with_server.py --server "./erp-bin server" --port 8069 -- \
            python -m pytest tests/e2e/ -v --e2e-base-url http://localhost:8069 --e2e-db erp

  e2e-pr-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install "passlib[bcrypt]>=1.7"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Init PR E2E database
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
        run: ./erp-bin db init -d erp

      - name: Run portal + app-tile E2E smoke (phase 811)
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          E2E_BASE_URL: http://localhost:8069
          E2E_LOGIN: admin
          E2E_PASSWORD: admin
          E2E_DB: erp
        run: |
          python scripts/with_server.py --server "./erp-bin server" --port 8069 -- \
            python -m pytest tests/e2e/test_portal_invoice_payment_tour_phase739.py tests/e2e/test_app_tile_navigation_tour.py -v --e2e-base-url http://localhost:8069 --e2e-db erp
